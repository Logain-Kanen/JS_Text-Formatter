<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatter</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Text Formatter</h1>
        <textarea name="input" id="input" placeholder="Enter the original text here"></textarea>
        <div class="buttons">
            <button onclick="upperCase()">UPPERCASE</button>
            <button onclick="lowerCase()">lowercase</button>
            <button onclick="capitalize()">Capitalize Words</button>
            <button onclick="removeExtra()">Remove Extra Spaces</button>
            <button onclick="replaceWord()">Replace Word</button>
            <button onclick="countChars()">Count Characters</button>
        </div>
        <div class="output">
            <h3>Formatted Text</h3>
            <p id="outputText"></p>
            <p id="charCount"></p>
        </div>
    </div>
</body>
</html>
